name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build the Svelte client (shared across all platform builds)
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/

  # Windows x64 — with Hamlib (vendored DLLs)
  windows:
    needs: client
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Build
        working-directory: server
        run: cargo build --release
      - name: Package
        shell: bash
        run: |
          mkdir -p release
          cp server/target/release/betterft8-server.exe release/
          cp server/hamlib-lib/libhamlib-4.dll release/
          cp server/hamlib-lib/libgcc_s_seh-1.dll release/
          cp server/hamlib-lib/libusb-1.0.dll release/
          cp server/hamlib-lib/libwinpthread-1.dll release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-windows-x64
          path: release/

  # Windows x64 — rigctld only (no Hamlib DLLs needed)
  windows-rigctld:
    needs: client
    runs-on: [self-hosted, Windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Build
        working-directory: server
        run: cargo build --release --no-default-features
      - name: Package
        shell: bash
        run: |
          mkdir -p release
          cp server/target/release/betterft8-server.exe release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-windows-x64-rigctld
          path: release/

  # Linux x64 — with Hamlib (requires libhamlib4 at runtime)
  linux:
    needs: client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libhamlib-dev
      - name: Build
        working-directory: server
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p release
          cp server/target/release/betterft8-server release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-linux-x64
          path: release/

  # Linux x64 — rigctld only (no Hamlib dependency)
  linux-rigctld:
    needs: client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Build
        working-directory: server
        run: cargo build --release --no-default-features
      - name: Package
        run: |
          mkdir -p release
          cp server/target/release/betterft8-server release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-linux-x64-rigctld
          path: release/

  # Raspberry Pi aarch64 — with Hamlib (requires libhamlib4 at runtime)
  raspberry-pi:
    needs: client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu --manifest-path server/Cargo.toml
      - name: Package
        run: |
          mkdir -p release
          cp server/target/aarch64-unknown-linux-gnu/release/betterft8-server release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-raspberry-pi-aarch64
          path: release/

  # Raspberry Pi aarch64 — rigctld only (no Hamlib dependency)
  raspberry-pi-rigctld:
    needs: client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist/
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build
        run: cross build --release --no-default-features --target aarch64-unknown-linux-gnu --manifest-path server/Cargo.toml
      - name: Package
        run: |
          mkdir -p release
          cp server/target/aarch64-unknown-linux-gnu/release/betterft8-server release/
      - uses: actions/upload-artifact@v4
        with:
          name: betterft8-raspberry-pi-aarch64-rigctld
          path: release/
